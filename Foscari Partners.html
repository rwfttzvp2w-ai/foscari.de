document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

te — card surfaces on paper */\n  --ink-50:  #f7f5f0;          /* paper / ivory — primary background  */\n  --ink-100: #efeae0;\n  --ink-150: #e6e0d4;\n  --ink-200: #ddd6c8;\n  --ink-300: #cbc2b1;\n  --ink-400: #aaa193;\n  --ink-500: #8a8175;          /* muted captions */\n  --ink-600: #6a6357;\n  --ink-700: #4c463d;\n  --ink-800: #2f2b25;\n  --ink-900: #1a1815;          /* warm near-black — brand ink, text */\n  --ink-950: #110f0d;\n\n  /* ---- Petrol — the digital / intelligence accent ---- */\n  --petrol-50:  #eaf1f0;\n  --petrol-100: #cfe0de;\n  --petrol-300: #8bb3b0;\n  --petrol-500: #1f4e4d;       /* primary interactive */\n  --petrol-600: #173e3d;       /* hover */\n  --petrol-700: #102e2d;       /* active / pressed */\n\n  /* ---- Brass — heritage accent, used sparingly ---- */\n  --brass-50:  #f4efe3;\n  --brass-100: #e9ddc3;\n  --brass-300: #cdb077;\n  --brass-500: #9c7c4a;        /* hairlines, marks, premium emphasis */\n  --brass-600: #836540;\n\n  /* ---- Semantic hues ---- */\n  --venetian-50:  #f6e7e3;\n  --venetian-500: #9e3b2d;     /* error / critical — Venetian red */\n  --venetian-600: #842f23;\n\n  --verde-50:  #e7eee8;\n  --verde-500: #3e6b4f;        /* success */\n  --verde-600: #2f5540;\n\n  --ochre-50:  #f6ecd9;\n  --ochre-500: #b07d27;        /* warning */\n  --ochre-600: #8f6419;\n\n  /* ============================================================\n     SEMANTIC ALIASES — reference these in components\n     ============================================================ */\n\n  /* Surfaces */\n  --surface-page:    var(--ink-50);\n  --surface-card:    var(--ink-0);\n  --surface-sunken:  var(--ink-100);\n  --surface-inverse: var(--ink-900);\n  --surface-overlay: rgba(26, 24, 21, 0.55);\n\n  /* Text */\n  --text-strong:   var(--ink-900);\n  --text-body:     var(--ink-800);\n  --text-muted:    var(--ink-600);\n  --text-subtle:   var(--ink-500);\n  --text-inverse:  var(--ink-50);\n  --text-on-accent:#ffffff;\n  --text-link:     var(--petrol-500);\n\n  /* Borders & rules */\n  --border-hairline: var(--ink-200);\n  --border-default:  var(--ink-300);\n  --border-strong:   var(--ink-900);\n  --border-brass:    var(--brass-500);\n\n  /* Accents */\n  --accent:          var(--petrol-500);\n  --accent-hover:    var(--petrol-600);\n  --accent-active:   var(--petrol-700);\n  --accent-soft:     var(--petrol-50);\n  --heritage:        var(--brass-500);\n  --heritage-soft:   var(--brass-50);\n\n  /* Status */\n  --status-error:    var(--venetian-500);\n  --status-error-soft:   var(--venetian-50);\n  --status-success:  var(--verde-500);\n  --status-success-soft: var(--verde-50);\n  --status-warning:  var(--ochre-500);\n  --status-warning-soft: var(--ochre-50);\n  --status-info:     var(--petrol-500);\n  --status-info-soft:    var(--petrol-50);\n\n  /* Focus ring */\n  --focus-ring: 0 0 0 3px rgba(31, 78, 77, 0.28);\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   FOSCARI — Typography tokens\n   Bodoni Moda (display) · Archivo (text/UI) · IBM Plex Mono (data)\n   ============================================================ */\n\n:root {\n  /* ---- Families ---- */\n  --font-display: 'Bodoni Moda', 'Didot', 'Times New Roman', serif;\n  --font-sans:    'Archivo', system-ui, -apple-system, 'Segoe UI', sans-serif;\n  --font-mono:    'IBM Plex Mono', ui-monospace, 'SF Mono', monospace;\n\n  /* ---- Weights ---- */\n  --weight-regular:  400;\n  --weight-medium:   500;\n  --weight-semibold: 600;\n  --weight-bold:     700;\n\n  /* ---- Type scale (1.250 major-third, 16px base) ---- */\n  --text-2xs: 0.6875rem;  /* 11px — micro labels, eyebrows */\n  --text-xs:  0.75rem;    /* 12px */\n  --text-sm:  0.875rem;   /* 14px */\n  --text-md:  1rem;       /* 16px — body base */\n  --text-lg:  1.125rem;   /* 18px — lead */\n  --text-xl:  1.375rem;   /* 22px */\n  --text-2xl: 1.75rem;    /* 28px */\n  --text-3xl: 2.25rem;    /* 36px */\n  --text-4xl: 3rem;       /* 48px */\n  --text-5xl: 4rem;       /* 64px */\n  --text-6xl: 5.5rem;     /* 88px — hero display */\n\n  /* ---- Line heights ---- */\n  --leading-tight:   1.08;   /* display headlines */\n  --leading-snug:    1.25;   /* sub-heads */\n  --leading-normal:  1.6;    /* body copy */\n  --leading-relaxed: 1.75;   /* long-form editorial */\n\n  /* ---- Letter spacing ---- */\n  --tracking-tight:  -0.02em;  /* large Didone display */\n  --tracking-normal: 0;\n  --tracking-wide:   0.04em;\n  --tracking-eyebrow: 0.22em;  /* the \"ENGINEERING & IT\" treatment */\n  --tracking-caps:    0.14em;\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   FOSCARI — Spacing & layout tokens\n   8px base rhythm with a 4px half-step.\n   ============================================================ */\n\n:root {\n  --space-0:   0;\n  --space-px:  1px;\n  --space-1:   0.25rem;  /* 4  */\n  --space-2:   0.5rem;   /* 8  */\n  --space-3:   0.75rem;  /* 12 */\n  --space-4:   1rem;     /* 16 */\n  --space-5:   1.5rem;   /* 24 */\n  --space-6:   2rem;     /* 32 */\n  --space-7:   2.5rem;   /* 40 */\n  --space-8:   3rem;     /* 48 */\n  --space-9:   4rem;     /* 64 */\n  --space-10:  5rem;     /* 80 */\n  --space-11:  6rem;     /* 96 */\n  --space-12:  8rem;     /* 128 */\n\n  /* ---- Layout ---- */\n  --container-sm:  640px;\n  --container-md:  860px;\n  --container-lg:  1120px;\n  --container-xl:  1320px;\n  --gutter:        var(--space-5);\n  --section-y:     var(--space-11);\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   FOSCARI — Elevation: radii, borders, shadows\n   Editorial restraint: hairline rules over heavy shadows,\n   small radii. Depth is implied, never theatrical.\n   ============================================================ */\n\n:root {\n  /* ---- Corner radii (minimal — this is an editorial brand) ---- */\n  --radius-none: 0;\n  --radius-xs:   2px;\n  --radius-sm:   4px;\n  --radius-md:   6px;\n  --radius-lg:   10px;\n  --radius-pill: 999px;\n  --radius-circle: 50%;\n\n  /* ---- Border widths ---- */\n  --border-w-hair: 1px;\n  --border-w-rule: 1.5px;\n  --border-w-bold: 2px;\n\n  /* ---- Shadows — soft, warm-tinted, low spread ---- */\n  --shadow-none: none;\n  --shadow-xs:  0 1px 2px rgba(26, 24, 21, 0.05);\n  --shadow-sm:  0 1px 3px rgba(26, 24, 21, 0.06), 0 1px 2px rgba(26, 24, 21, 0.04);\n  --shadow-md:  0 4px 14px rgba(26, 24, 21, 0.07), 0 1px 3px rgba(26, 24, 21, 0.05);\n  --shadow-lg:  0 12px 32px rgba(26, 24, 21, 0.10), 0 3px 8px rgba(26, 24, 21, 0.05);\n  --shadow-xl:  0 24px 60px rgba(26, 24, 21, 0.14);\n\n  /* ---- Inner shadow (inputs, sunken wells) ---- */\n  --shadow-inset: inset 0 1px 2px rgba(26, 24, 21, 0.06);\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   FOSCARI — Motion tokens\n   Calm, considered, never bouncy. Short fades and slides;\n   restrained easing that feels engineered, not playful.\n   ============================================================ */\n\n:root {\n  --duration-instant: 80ms;  /* @kind other */\n  --duration-fast:    140ms; /* @kind other */\n  --duration-base:    220ms; /* @kind other */\n  --duration-slow:    360ms; /* @kind other */\n  --duration-slower:  600ms; /* @kind other */\n\n  /* Standard easing — a confident ease-out */\n  --ease-standard: cubic-bezier(0.22, 0.61, 0.36, 1); /* @kind other */\n  /* Entrances */\n  --ease-out:      cubic-bezier(0.16, 1, 0.3, 1); /* @kind other */\n  /* Symmetric in/out for moving objects */\n  --ease-in-out:   cubic-bezier(0.65, 0, 0.35, 1); /* @kind other */\n\n  --transition-colors: color var(--duration-fast) var(--ease-standard),\n                       background-color var(--duration-fast) var(--ease-standard),\n                       border-color var(--duration-fast) var(--ease-standard);\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   FOSCARI — Base layer\n   Minimal, opinionated resets that establish the editorial\n   baseline. Consumers get sensible defaults for free.\n   ============================================================ */\n\n*, *::before, *::after { box-sizing: border-box; }\n\nhtml { -webkit-text-size-adjust: 100%; }\n\nbody {\n  margin: 0;\n  background: var(--surface-page);\n  color: var(--text-body);\n  font-family: var(--font-sans);\n  font-size: var(--text-md);\n  line-height: var(--leading-normal);\n  font-weight: var(--weight-regular);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\nh1, h2, h3, h4, h5, h6 {\n  margin: 0;\n  font-family: var(--font-display);\n  font-weight: var(--weight-medium);\n  line-height: var(--leading-tight);\n  letter-spacing: var(--tracking-tight);\n  color: var(--text-strong);\n}\n\np { margin: 0; }\n\na {\n  color: var(--text-link);\n  text-decoration: none;\n  transition: var(--transition-colors);\n}\na:hover { color: var(--accent-hover); }\n\n/* Eyebrow / overline — echoes the \"ENGINEERING & IT\" wordmark treatment */\n.foscari-eyebrow {\n  font-family: var(--font-sans);\n  font-size: var(--text-2xs);\n  font-weight: var(--weight-semibold);\n  letter-spacing: var(--tracking-eyebrow);\n  text-transform: uppercase;\n  color: var(--text-muted);\n}\n\n::selection { background: var(--petrol-100); color: var(--ink-900); }\n\n:focus-visible { outline: none; box-shadow: var(--focus-ring); border-radius: var(--radius-xs); }\n\n@media (prefers-reduced-motion: reduce) {\n  *, *::before, *::after {\n    animation-duration: 0.01ms !important;\n    transition-duration: 0.01ms !important;\n  }\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   FOSCARI Engineering & IT — Design System\n   Global stylesheet entry point.\n   Consumers link THIS one file. It is an @import manifest only.\n   ============================================================ */\n\n/* ============================================================\n   FOSCARI — Webf #1a1815;          /* warm near-black — brand ink, text */\n  --ink-950: #110f0d;\n\n  /* ---- Petrol — the digital / intelligence accent ---- */\n  --petrol-50:  #eaf1f0;\n  --petrol-100: #cfe0de;\n  --petrol-300: #8bb3b0;\n  --petrol-500: #1f4e4d;       /* primary interactive */\n  --petrol-600: #173e3d;       /* hover */\n  --petrol-700: #102e2d;       /* active / pressed */\n\n  /* ---- Brass — heritage accent, used sparingly ---- */\n  --brass-50:  #f4efe3;\n  --brass-100: #e9ddc3;\n  --brass-300: #cdb077;\n  --brass-500: #9c7c4a;        /* hairlines, marks, premium emphasis */\n  --brass-600: #836540;\n\n  /* ---- Semantic hues ---- */\n  --venetian-50:  #f6e7e3;\n  --venetian-500: #9e3b2d;     /* error / critical — Venetian red */\n  --venetian-600: #842f23;\n\n  --verde-50:  #e7eee8;\n  --verde-500: #3e6b4f;        /* success */\n  --verde-600: #2f5540;\n\n  --ochre-50:  #f6ecd9;\n  --ochre-500: #b07d27;        /* warning */\n  --ochre-600: #8f6419;\n\n  /* ============================================================\n     SEMANTIC ALIASES — reference these in components\n     ============================================================ */\n\n  /* Surfaces */\n  --surface-page:    var(--ink-50);\n  --surface-card:    var(--ink-0);\n  --surface-sunken:  var(--ink-100);\n  --surface-inverse: var(--ink-900);\n  --surface-overlay: rgba(26, 24, 21, 0.55);\n\n  /* Text */\n  --text-strong:   var(--ink-900);\n  --text-body:     var(--ink-800);\n  --text-muted:    var(--ink-600);\n  --text-subtle:   var(--ink-500);\n  --text-inverse:  var(--ink-50);\n  --text-on-accent:#ffffff;\n  --text-link:     var(--petrol-500);\n\n  /* Borders & rules */\n  --border-hairline: var(--ink-200);\n  --border-default:  var(--ink-300);\n  --border-strong:   var(--ink-900);\n  --border-brass:    var(--brass-500);\n\n  /* Accents */\n  --accent:          var(--petrol-500);\n  --accent-hover:    var(--petrol-600);\n  --accent-active:   var(--petrol-700);\n  --accent-soft:     var(--petrol-50);\n  --heritage:        var(--brass-500);\n  --heritage-soft:   var(--brass-50);\n\n  /* Status */\n  --status-error:    var(--venetian-500);\n  --status-error-soft:   var(--venetian-50);\n  --status-success:  var(--verde-500);\n  --status-success-soft: var(--verde-50);\n  --status-warning:  var(--ochre-500);\n  --status-warning-soft: var(--ochre-50);\n  --status-info:     var(--petrol-500);\n  --status-info-soft:    var(--petrol-50);\n\n  /* Focus ring */\n  --focus-ring: 0 0 0 3px rgba(31, 78, 77, 0.28);\n}\n\n/* ============================================================\n   FOSCARI — Typography tokens\n   Bodoni Moda (display) · Archivo (text/UI) · IBM Plex Mono (data)\n   ============================================================ */\n\n:root {\n  /* ---- Families ---- */\n  --font-display: 'Bodoni Moda', 'Didot', 'Times New Roman', serif;\n  --font-sans:    'Archivo', system-ui, -apple-system, 'Segoe UI', sans-serif;\n  --font-mono:    'IBM Plex Mono', ui-monospace, 'SF Mono', monospace;\n\n  /* ---- Weights ---- */\n  --weight-regular:  400;\n  --weight-medium:   500;\n  --weight-semibold: 600;\n  --weight-bold:     700;\n\n  /* ---- Type scale (1.250 major-third, 16px base) ---- */\n  --text-2xs: 0.6875rem;  /* 11px — micro labels, eyebrows */\n  --text-xs:  0.75rem;    /* 12px */\n  --text-sm:  0.875rem;   /* 14px */\n  --text-md:  1rem;       /* 16px — body base */\n  --text-lg:  1.125rem;   /* 18px — lead */\n  --text-xl:  1.375rem;   /* 22px */\n  --text-2xl: 1.75rem;    /* 28px */\n  --text-3xl: 2.25rem;    /* 36px */\n  --text-4xl: 3rem;       /* 48px */\n  --text-5xl: 4rem;       /* 64px */\n  --text-6xl: 5.5rem;     /* 88px — hero display */\n\n  /* ---- Line heights ---- */\n  --leading-tight:   1.08;   /* display headlines */\n  --leading-snug:    1.25;   /* sub-heads */\n  --leading-normal:  1.6;    /* body copy */\n  --leading-relaxed: 1.75;   /* long-form editorial */\n\n  /* ---- Letter spacing ---- */\n  --tracking-tight:  -0.02em;  /* large Didone display */\n  --tracking-normal: 0;\n  --tracking-wide:   0.04em;\n  --tracking-eyebrow: 0.22em;  /* the \"ENGINEERING & IT\" treatment */\n  --tracking-caps:    0.14em;\n}\n\n/* ============================================================\n   FOSCARI — Spacing & layout tokens\n   8px base rhythm with a 4px half-step.\n   ============================================================ */\n\n:root {\n  --space-0:   0;\n  --space-px:  1px;\n  --space-1:   0.25rem;  /* 4  */\n  --space-2:   0.5rem;   /* 8  */\n  --space-3:   0.75rem;  /* 12 */\n  --space-4:   1rem;     /* 16 */\n  --space-5:   1.5rem;   /* 24 */\n  --space-6:   2rem;     /* 32 */\n  --space-7:   2.5rem;   /* 40 */\n  --space-8:   3rem;     /* 48 */\n  --space-9:   4rem;     /* 64 */\n  --space-10:  5rem;     /* 80 */\n  --space-11:  6rem;     /* 96 */\n  --space-12:  8rem;     /* 128 */\n\n  /* ---- Layout ---- */\n  --container-sm:  640px;\n  --container-md:  860px;\n  --container-lg:  1120px;\n  --container-xl:  1320px;\n  --gutter:        var(--space-5);\n  --section-y:     var(--space-11);\n}\n\n/* ============================================================\n   FOSCARI — Elevation: radii, borders, shadows\n   Editorial restraint: hairline rules over heavy shadows,\n   small radii. Depth is implied, never theatrical.\n   ============================================================ */\n\n:root {\n  /* ---- Corner radii (minimal — this is an editorial brand) ---- */\n  --radius-none: 0;\n  --radius-xs:   2px;\n  --radius-sm:   4px;\n  --radius-md:   6px;\n  --radius-lg:   10px;\n  --radius-pill: 999px;\n  --radius-circle: 50%;\n\n  /* ---- Border widths ---- */\n  --border-w-hair: 1px;\n  --border-w-rule: 1.5px;\n  --border-w-bold: 2px;\n\n  /* ---- Shadows — soft, warm-tinted, low spread ---- */\n  --shadow-none: none;\n  --shadow-xs:  0 1px 2px rgba(26, 24, 21, 0.05);\n  --shadow-sm:  0 1px 3px rgba(26, 24, 21, 0.06), 0 1px 2px rgba(26, 24, 21, 0.04);\n  --shadow-md:  0 4px 14px rgba(26, 2
